name: network_speed_monitor
description: "A pure Dart package to monitor real-time network upload/download speed by tracking actual app traffic. Includes a stream API, quality labels, and a ready-made widget."
version: 0.0.1
homepage: https://github.com/DevelopWithGaurav/network_speed_monitor

environment:
  sdk: ^3.11.4
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  # Pure Dart + Flutter package, no native plugin registration needed
